# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

[directory]
style = "white"

[character]
success_symbol = '[*](bold white)'
error_symbol = '[*](bold red)'
vimcmd_symbol = '[v](bold white)'

[battery]
full_symbol = "• "
charging_symbol = "⇡ "
discharging_symbol = "⇣ "
unknown_symbol = "❓ "
empty_symbol = "❗ "

[nodejs]
style = "white"
version_format = "${raw}"
symbol = "nodejs:"

[git_branch]
symbol = "git:"
style = "white"

[git_status]
style = "white"

[typst]
symbol = "t "
